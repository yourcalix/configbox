services:
  configbox:
    image: configbox:latest
    build:
      context: .
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple/}
    container_name: configbox
    restart: unless-stopped
    env_file:
      - .env
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "8787:8787"
      - "127.0.0.1:18080:18080"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      APP_HOST: 0.0.0.0
      APP_PORT: 8787
      APP_USERNAME: ${APP_USERNAME:-admin}
      APP_COOKIE_SECURE: ${APP_COOKIE_SECURE:-false}
      CLAUDE_CONFIG_PATH: /config/claude/settings.json
      CODEX_CONFIG_PATH: /config/codex/auth.json
      CODEX_CONFIG_TOML_PATH: /config/codex/config.toml
      CODEX_GATEWAY_HOST: ${CODEX_GATEWAY_HOST:-0.0.0.0}
      CODEX_GATEWAY_PORT: ${CODEX_GATEWAY_PORT:-18080}
      CODEX_GATEWAY_PUBLIC_HOST: ${CODEX_GATEWAY_PUBLIC_HOST:-127.0.0.1}
      GATEWAY_LOG_MAX_MB: ${GATEWAY_LOG_MAX_MB:-50}
      DATA_DIR: /data
      BACKUP_RETENTION: ${BACKUP_RETENTION:-50}
    volumes:
      - ${HOME}/.claude:/config/claude
      - ${HOME}/.codex:/config/codex
      - ${HOME}/.configbox:/data
