[package]
name = "codex-app-transfer-proxy"
version = "0.1.0"
description = "HTTP/SSE forwarding proxy core (Stage 2 skeleton port of backend/proxy.py)"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

[dependencies]
codex-app-transfer-registry = { path = "../registry" }
codex-app-transfer-adapters = { path = "../adapters" }
axum = { version = "0.8", features = ["http1", "http2", "tokio", "ws"] }
bytes = "1"
chrono = { version = "0.4", default-features = false, features = ["clock"] }
futures-core = "0.3"
futures-util = "0.3"
http = "1"
# rustls-tls 走纯 Rust TLS 栈,跨平台编译时不需要 system OpenSSL
reqwest = { version = "0.12", default-features = false, features = ["stream", "rustls-tls", "http2"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "net", "sync", "time"] }
tokio-stream = "0.1"
tower = "0.5"
tower-http = { version = "0.6", features = ["trace"] }
tracing = "0.1"

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
indexmap = "2"
tokio-tungstenite = "0.29"
