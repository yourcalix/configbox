[package]
name = "codex-app-transfer-codex-integration"
version = "0.1.0"
description = "Codex CLI 配置文件读写 + apply/restore + snapshot(Stage 2.5,原 backend/registry.py 中 ~/.codex/* 集成层的 Rust 端口)"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
codex-app-transfer-registry = { path = "../registry" }

[dev-dependencies]
tempfile = "3"
